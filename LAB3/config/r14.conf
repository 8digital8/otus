
!
version 15.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname msk-as1001-r14
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
clock timezone +11 11 0
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!


!
!
!
!
ip domain name msk.local
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
username admin privilege 15 secret 5 $1$Tbmb$QXuPK2wwvYc.6jM3HYr6k/
!
redundancy
!
!
ip ssh version 2
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 no shutdown
 description routers_managment
 ip address 10.0.100.14 255.255.255.255
 ip ospf 1 area 0
!
interface Ethernet0/0
 no shutdown
 description to-r12
 ip address 172.16.0.6 255.255.255.252
 ip ospf 1 area 10
!
interface Ethernet0/1
 no shutdown
 description to-r13
 ip address 172.16.0.14 255.255.255.252
 ip ospf 1 area 10
!
interface Ethernet0/2
 no shutdown
 description to-as101-r22
 ip address 172.16.0.25 255.255.255.252
!
interface Ethernet0/3
 no shutdown
 description to-r19
 ip address 172.16.0.2 255.255.255.252
 ip ospf 1 area 101
!
interface Ethernet1/0
 no shutdown
 description description to-r15
 ip address 172.16.0.93 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet1/1
 no shutdown
 no ip address
 shutdown
!
interface Ethernet1/2
 no shutdown
 no ip address
 shutdown
!
interface Ethernet1/3
 no shutdown
 no ip address
 shutdown
!
router ospf 1
 router-id 10.0.100.14
 area 10 stub
 area 101 stub no-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input ssh
!
!
end
