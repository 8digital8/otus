version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
service compress-config
!
hostname spb-as2042-sw10
!
boot-start-marker
boot-end-marker
!
!
!
username admin privilege 15 secret 5 $1$o2oO$QH5SLRFl8A8LP20LbSn1h1
no aaa new-model
clock timezone +11 11 0
!
!
!
!
!
!
!
!
ip domain-name spb.local
ip cef
no ipv6 cef
!
!
spanning-tree mode pvst
spanning-tree extend system-id
!
vlan internal allocation policy ascending
!
ip ssh version 2
!
!
!
!
!
!
!
!
!
!
!
!
interface Ethernet0/0
!
interface Ethernet0/1
!
interface Ethernet0/2
 description wrk-1001
 switchport access vlan 1001
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/3
 description trunk-to-r16
 switchport trunk encapsulation dot1q
 switchport mode trunk
!
interface Ethernet1/0
!
interface Ethernet1/1
!
interface Ethernet1/2
!
interface Ethernet1/3
!
interface Vlan101
 ip address 10.0.102.10 255.255.255.0
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
ip route 0.0.0.0 0.0.0.0 10.0.102.16 track 1
ip route 0.0.0.0 0.0.0.0 10.0.102.17
ip route 0.0.0.0 0.0.0.0 10.0.102.16
!
!
ip sla 1
 icmp-echo 10.0.102.16 source-interface Vlan101
 frequency 5
ip sla schedule 1 life forever start-time now
!
!
!
control-plane
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input ssh
!
!
end