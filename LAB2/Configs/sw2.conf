version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
service compress-config
!
hostname msk-as1001-sw2
!
boot-start-marker
boot-end-marker
!
!
!
username admin privilege 15 secret 5 $1$1HS5$n56fLqAQlobo7EvEsgs0c0
no aaa new-model
clock timezone +11 11 0
!
!
!
!
!
!
!
!
ip domain-name msk.local
ip cef
no ipv6 cef
!
!
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
!
vlan internal allocation policy ascending
!
track 1 ip sla 1 reachability
!
ip ssh version 2
!
!
!
!
!
!
!
!
!
!
!
!
interface Ethernet0/0
 description trunk-to-sw5
 switchport trunk encapsulation dot1q
 switchport mode trunk
 spanning-tree port-priority 64
!
interface Ethernet0/1
 description trunk-to-sw4
 switchport trunk encapsulation dot1q
 switchport mode trunk
!
interface Ethernet0/2
 description wrk-1001
 switchport access vlan 1001
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface Ethernet0/3
 shutdown
!
interface Ethernet1/0
 shutdown
!
interface Ethernet1/1
 shutdown
!
interface Ethernet1/2
 shutdown
!
interface Ethernet1/3
 shutdown
!
interface Vlan101
 ip address 10.0.101.2 255.255.255.0
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
ip route 0.0.0.0 0.0.0.0 10.0.101.13 track 1
ip route 0.0.0.0 0.0.0.0 10.0.101.13
ip route 0.0.0.0 0.0.0.0 10.0.101.12
!
!
ip sla 1
 icmp-echo 10.0.101.13 source-interface Vlan101
 frequency 5
ip sla schedule 1 life forever start-time now
!
!
!
control-plane
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input ssh
!
!
end
