version 15.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname spb-as2042-r18
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
clock timezone +11 11 0
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!


!
!
!
!
ip domain name spb.local
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
username admin privilege 15 secret 5 $1$Fgc4$O7MbmYUT7Tki3tPi1wpJu/
!
redundancy
!
!
ip ssh version 2
!
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description routers_managmen
 ip address 10.0.100.18 255.255.255.255
!
interface Ethernet0/0
 description to-r16
 ip address 172.16.0.74 255.255.255.252
 ip policy route-map PBR
!
interface Ethernet0/1
 description to-r17
 ip address 172.16.0.70 255.255.255.252
 ip policy route-map PBR
!
interface Ethernet0/2
 description to-as520-r24
 ip address 172.16.0.61 255.255.255.252
!
interface Ethernet0/3
 description to-as520-r26
 ip address 172.16.0.65 255.255.255.252
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
route-map PBR permit 10
 match ip address 100
 set ip next-hop 172.16.0.62
!
route-map PBR permit 20
 match ip address 101
 set ip next-hop 172.16.0.66
!
!
access-list 100 permit ip 192.168.102.0 0.0.0.255 any
access-list 101 permit ip 192.168.103.0 0.0.0.255 any
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input ssh
!
!
end
