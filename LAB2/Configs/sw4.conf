version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
service compress-config
!
hostname msk-as1001-sw4
!
boot-start-marker
boot-end-marker
!
!
!
username admin privilege 15 secret 5 $1$oZaU$OzZMz8YDqf7o32kaXX1Se1
no aaa new-model
clock timezone +11 11 0
!
!
!
!
!
!
!
!
ip domain-name msk.local
ip cef
no ipv6 cef
!
!
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
!
vlan internal allocation policy ascending
!
ip ssh version 2
!
!
!
!
!
!
!
!
!
!
!
!
interface Port-channel1
 description lag-trunk-to-sw5
 switchport trunk encapsulation dot1q
 switchport mode trunk
 spanning-tree port-priority 192
!
interface Ethernet0/0
 description trunk-to-sw3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 spanning-tree port-priority 64
!
interface Ethernet0/1
 description trunk-to-sw2
 switchport trunk encapsulation dot1q
 switchport mode trunk
!
interface Ethernet0/2
 description lag-trunk-to-sw5
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 1 mode active
!
interface Ethernet0/3
 description lag-trunk-to-sw5
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 1 mode active
!
interface Ethernet1/0
 description trunk-to-r12
 switchport trunk encapsulation dot1q
 switchport mode trunk
 spanning-tree port-priority 64
!
interface Ethernet1/1
 description trunk-to-r13
 switchport trunk encapsulation dot1q
 switchport mode trunk
!
interface Ethernet1/2
!
interface Ethernet1/3
!
interface Vlan101
 ip address 10.0.101.4 255.255.255.0
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
ip route 0.0.0.0 0.0.0.0 10.0.101.12 track 1
ip route 0.0.0.0 0.0.0.0 10.0.101.12
ip route 0.0.0.0 0.0.0.0 10.0.101.13
!
!
ip sla 1
 icmp-echo 10.0.101.12 source-interface Vlan101
 frequency 5
ip sla schedule 1 life forever start-time now
!
!
!
control-plane
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input ssh
!
!
end
